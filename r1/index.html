<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>SIS® Assist · r1 Creation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   SIS® Assist als r1 Creation
   BRAUN Design System · Variante „Papier" · v1.0
   Display 240 × 282 px · Raster 4 px · Rand 16 px
   Eingabe: Scrollrad (wählen) · Taste (bestätigen)
   ========================================================== */
:root{
  --bg:#E7E4DE;      /* Papier */
  --sf:#F0EEE9;      /* Fläche */
  --fg:#1B1A17;      /* Tinte */
  --mut:#8A867E;     /* Grau */
  --line:#C7C3BA;    /* Hairline */
  --ac:#D75A1E;      /* Akzent — genau ein aktives Element */
  --acf:#FFFFFF;
  --ocker:#C8862E;
  --sans:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-in:cubic-bezier(.2,.7,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:#D7D4CC; /* Beton — Desktop-Umfeld */
  font-family:var(--sans);color:var(--fg);
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
::selection{background:var(--ac);color:#fff}

/* ---- Bühne: exakt das r1-Display ---- */
#stage{
  position:relative;width:240px;height:282px;flex:none;
  background:var(--bg);overflow:hidden;
  display:flex;flex-direction:column;
}
/* Desktop-Vorschau bekommt Gehäuse-Kante; auf dem Gerät (≤260px) fällt sie weg */
@media (min-width:261px){
  #stage{border:1px solid rgba(0,0,0,.18);border-radius:8px;box-shadow:0 2px 0 rgba(0,0,0,.08)}
}
@media (max-width:260px){
  body{background:var(--bg);display:block}
  #stage{width:100%;height:100%}
  #deskhint{display:none}
}
#deskhint{
  position:fixed;left:0;right:0;bottom:14px;text-align:center;
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:#7C786F;text-transform:uppercase;
}
#deskhint b{color:var(--ac);font-weight:500}

/* ---- Kopf · 40 ---- */
#head{
  height:40px;flex:none;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;border-bottom:1px solid var(--line);
}
#head .brand{font-size:13px;font-weight:700;letter-spacing:-.01em;cursor:pointer;user-select:none}
#head .brand sup{font-size:7px;vertical-align:super}
#bk{
  font-family:var(--mono);font-size:17px;line-height:1;color:var(--ac);
  cursor:pointer;user-select:none;padding:6px 8px 6px 0;visibility:hidden;
}
#head .scr{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}

/* ---- Inhalt ---- */
#main{flex:1;overflow:hidden;position:relative}
.pane{position:absolute;inset:0;overflow-y:auto;scrollbar-width:none;animation:enter .2s var(--ease-in)}
.pane::-webkit-scrollbar{display:none}
@keyframes enter{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes bar{0%{transform:translateX(-100%)}100%{transform:translateX(240px)}}

/* ---- Listenzeile — Scrollrad-Auswahl ---- */
.row{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;min-height:26px;
  font-size:13px;font-weight:500;cursor:pointer;user-select:none;
  border-bottom:1px solid rgba(199,195,186,.55);
  transition:background .12s var(--ease);
}
.row .idx{font-family:var(--mono);font-size:10px;color:var(--mut);width:12px;flex:none}
.row .lab{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .st{font-family:var(--mono);font-size:10px;color:var(--mut);flex:none}
.row .st.full{color:var(--fg)}
.row.on{background:var(--ac);color:var(--acf)}
.row.on .idx,.row.on .st{color:rgba(255,255,255,.85)}
.row.back .lab{color:var(--mut);font-size:12px}
.row.on.back .lab{color:var(--acf)}

/* ---- Fuß: Hinweis · 24 / Aktion · 48 ---- */
#hint{
  height:24px;flex:none;display:flex;align-items:center;justify-content:center;gap:4px;
  font-family:var(--mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);
  border-top:1px solid var(--line);padding:0 8px;white-space:nowrap;overflow:hidden;
}
#hint b{color:var(--ac);font-weight:500}
#hint.err{color:var(--acf);background:var(--ac)}
#hint.err b{color:var(--acf)}

/* ---- Editor ---- */
.ed-label{
  font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mut);padding:12px 16px 6px;
}
.ed-text{
  padding:0 16px 12px;font-size:14px;line-height:1.45;white-space:pre-wrap;word-break:break-word;
}
.ed-text .ph{color:var(--mut);font-size:12px;line-height:1.5}
.caret{
  display:inline-block;width:7px;height:15px;margin-left:1px;vertical-align:-2px;
  background:var(--ac);animation:blink 1s step-start infinite;
}
#kb{position:absolute;opacity:0;left:-9999px;top:0;width:10px;height:10px}
.ed-tools{display:flex;gap:1px;background:var(--line);border-top:1px solid var(--line)}
.ed-tools div{
  flex:1;background:var(--sf);text-align:center;padding:8px 0;
  font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--fg);
  cursor:pointer;user-select:none;text-transform:uppercase;
}
.ed-tools div.warn{color:var(--ac)}
.rec{
  display:inline-block;width:8px;height:8px;background:var(--ac);border-radius:50%;
  margin-right:6px;animation:blink .8s step-start infinite;vertical-align:0;
}

/* ---- On-Screen-Tastatur ---- */
.osk{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  background:var(--line);border-top:1px solid var(--line);
  display:flex;flex-direction:column;gap:1px;padding-top:1px;
}
.osk .krow{display:flex;gap:1px}
.osk .key{
  flex:1;height:27px;display:flex;align-items:center;justify-content:center;
  background:var(--sf);font-family:var(--mono);font-size:12px;color:var(--fg);
  cursor:pointer;user-select:none;
}
.osk .key.fn{color:var(--ac);font-size:11px}
.osk .key.on,.osk .key:active{background:var(--ac);color:var(--acf)}

/* ---- Risikomatrix ---- */
.grid{padding:8px 16px 4px}
.g-head,.g-row{display:flex;gap:1px}
.g-head span,.g-row span{
  flex:1;text-align:center;font-family:var(--mono);
}
.g-head span{font-size:8px;letter-spacing:.04em;color:var(--mut);padding:3px 0}
.g-row span.tf{flex:none;width:14px;font-size:9px;color:var(--mut);display:flex;align-items:center;justify-content:center}
.g-head span.tf{flex:none;width:14px}
.g-row .cell{
  height:25px;display:flex;align-items:center;justify-content:center;
  background:var(--sf);font-size:11px;font-weight:500;cursor:pointer;user-select:none;
  border:1px solid transparent;position:relative;color:var(--fg);
}
.g-row{margin-top:1px}
.g-row .cell .dot{color:var(--line)}
.g-row .cell em{
  font-style:normal;position:absolute;top:1px;right:2px;
  font-size:8px;color:var(--ocker);font-weight:600;
}
.g-row .cell.on{border-color:var(--ac);background:rgba(215,90,30,.12)}
.legend{
  font-family:var(--mono);font-size:8px;line-height:1.7;color:var(--mut);
  padding:8px 16px 10px;letter-spacing:.02em;
}

/* ---- Plan / Aktion ---- */
.sum{padding:10px 16px 6px}
.sum .li{
  display:flex;justify-content:space-between;align-items:baseline;
  font-family:var(--mono);font-size:10px;color:var(--mut);
  padding:4px 0;border-bottom:1px solid rgba(199,195,186,.55);
}
.sum .li b{color:var(--fg);font-weight:500}
#action{
  position:absolute;bottom:0;left:0;right:0;background:var(--bg);
  height:48px;display:flex;gap:8px;align-items:center;padding:0 16px;
  border-top:1px solid var(--line);
}
.sum{padding-bottom:56px}
.btn-p{
  flex:1;background:var(--ac);color:var(--acf);text-align:center;
  font-size:13px;font-weight:700;padding:11px 0;border-radius:2px;cursor:pointer;user-select:none;
}
.btn-s{
  width:46px;border:1px solid var(--mut);color:var(--fg);text-align:center;
  padding:10px 0;font-size:13px;border-radius:2px;cursor:pointer;user-select:none;
}

/* ---- Laden ---- */
#busy{
  position:absolute;inset:0;background:var(--bg);z-index:5;
  display:none;flex-direction:column;justify-content:center;padding:0 16px;
}
#busy.vis{display:flex}
#busy .t1{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--mut);text-transform:uppercase}
#busy .t2{font-size:22px;font-weight:700;letter-spacing:-.01em;margin:8px 0 18px}
#busy .track{height:3px;background:var(--line);overflow:hidden;position:relative}
#busy .track i{position:absolute;top:0;left:0;height:3px;width:90px;background:var(--ac);animation:bar 1.1s var(--ease) infinite}

/* ---- Ergebnis ---- */
.res{padding:10px 16px 16px;font-size:12px;line-height:1.5}
.res h4{
  font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ac);font-weight:600;margin:14px 0 4px;
}
.res h4:first-child{margin-top:0}
.res p{margin:0 0 8px}
.res li{list-style:none;padding-left:12px;position:relative;margin:0 0 3px}
.res li::before{content:"–";position:absolute;left:0;color:var(--mut)}
.res strong{font-weight:700}
</style>
</head>
<body>

<div id="stage">
  <div id="head">
    <span style="display:flex;align-items:center">
      <span id="bk">‹</span>
      <span class="brand" id="brand">SIS<sup>®</sup>&nbsp;Assist</span>
    </span>
    <span class="scr" id="scrlab">START</span>
  </div>
  <div id="main"></div>
  <div id="hint"></div>
  <div id="busy">
    <div class="t1">Maßnahmenplan</div>
    <div class="t2" style="animation:blink 1.2s step-start infinite">Generiere&nbsp;…</div>
    <div class="track"><i></i></div>
  </div>
</div>
<div id="deskhint"><b>▲▼</b> Rad&nbsp;&nbsp;·&nbsp;&nbsp;<b>Enter</b> Taste&nbsp;&nbsp;·&nbsp;&nbsp;<b>Esc</b> Zurück</div>

<textarea id="kb" autocomplete="off" autocapitalize="sentences"></textarea>

<script>
/* ==========================================================
   Daten & Konstanten
   ========================================================== */
var API_URL = 'https://sis-assist.vercel.app/api/generate';

var THEMENFELDER = [
  'Kognitive und kommunikative Fähigkeiten',
  'Mobilität und Beweglichkeit',
  'Krankheitsbezogene Anforderungen und Belastungen',
  'Selbstversorgung',
  'Leben in sozialen Beziehungen',
  'Wohnen/Häuslichkeit'
];
var TF_KURZ = ['Kognition & Kommunikation','Mobilität','Krankheit & Belastung','Selbstversorgung','Soziale Beziehungen','Wohnen/Häuslichkeit'];
var RISIKEN = ['Dekubitus','Sturz','Inkontinenz','Schmerz','Ernährung','Sonstiges'];
var RISIKEN_K = ['DK','ST','IK','SZ','ER','SO'];

var SYSTEM_PROMPT = 'Du bist ein erfahrener Pflegeexperte und hilfst bei der Erstellung individueller Maßnahmenpläne auf Basis der Strukturierten Informationssammlung (SIS®).\n\nDeine Aufgabe:\nAnalysiere die bereitgestellten Informationen aus der SIS und erstelle einen konkreten, individualisierten Maßnahmenplan.\n\nStruktur des Maßnahmenplans:\n1. **Zusammenfassung der Pflegesituation** (2-3 Sätze)\n2. **Identifizierte Pflegeprobleme und Ressourcen**\n3. **Pflegeziele** (SMART formuliert)\n4. **Geplante Maßnahmen** - gegliedert nach den relevanten Themenfeldern:\n   - Konkrete Handlungsanweisungen\n   - Häufigkeit/Zeitpunkt der Durchführung\n   - Verantwortlichkeiten\n5. **Evaluationskriterien** - Woran erkennen wir Erfolg?\n\nWichtige Hinweise:\n- Formuliere praxisnah und umsetzbar\n- Berücksichtige die Ressourcen und Wünsche der pflegebedürftigen Person\n- Beachte die identifizierten Risiken aus der Matrix\n- Verwende professionelle Pflegefachsprache\n- Der Plan soll als Arbeitsgrundlage für das Pflegeteam dienen\n- Fasse dich kompakt: der Plan wird auf einem sehr kleinen Display gelesen\n\nAntworte auf Deutsch und formatiere den Plan übersichtlich mit Markdown.';

/* Felder-Registry für den Editor */
var FIELDS = {
  patientName:{label:'Name',multi:false,ph:'Name der pflegebedürftigen Person'},
  birthDate:{label:'Geburtsdatum',multi:false,ph:'z. B. 12.03.1941'},
  interviewDate:{label:'Gespräch am',multi:false,ph:'z. B. 05.07.2026'},
  nurseSign:{label:'Handzeichen',multi:false,ph:'Kürzel der Pflegefachkraft'},
  oTon:{label:'O-Ton — „Was bewegt Sie im Augenblick?"',multi:true,ph:'Aussagen der Person, der Angehörigen oder des Betreuers in deren eigenen Worten …'},
  tf1:{label:'1 · '+TF_KURZ[0],multi:true,ph:'Orientierung, Gedächtnis, Aufmerksamkeit, Verstehen und Sich-mitteilen …'},
  tf2:{label:'2 · '+TF_KURZ[1],multi:true,ph:'Positionswechsel, Sitzposition, Aufstehen, Fortbewegen, Treppensteigen …'},
  tf3:{label:'3 · '+TF_KURZ[2],multi:true,ph:'Medikation, Verbandswechsel, Therapien, Arztbesuche, Umgang mit Erkrankungen …'},
  tf4:{label:'4 · '+TF_KURZ[3],multi:true,ph:'Körperpflege, An-/Auskleiden, Essen und Trinken, Ausscheidung …'},
  tf5:{label:'5 · '+TF_KURZ[4],multi:true,ph:'Kontakte, Aktivitäten, Tagesgestaltung, Interessen, Teilhabe …'},
  tf6:{label:'6 · '+TF_KURZ[5],multi:true,ph:'Zimmergestaltung, persönliche Gegenstände, Orientierung im Wohnbereich …'}
};

/* Datenmodell */
function blankData(){
  var r=[]; for(var i=0;i<6;i++){ var row=[]; for(var j=0;j<6;j++) row.push({v:'',w:false}); r.push(row); }
  return { patientName:'',birthDate:'',interviewDate:'',nurseSign:'',oTon:'',
           tf1:'',tf2:'',tf3:'',tf4:'',tf5:'',tf6:'', risiken:r, plan:'' };
}
/* Bewohnerverzeichnis — mehrere Datensätze, einer aktiv */
var APP = { residents:[], activeId:null };
var D = null; /* aktiver Datensatz (Referenz in APP.residents) */

function newId(){ return 'b'+Date.now().toString(36)+Math.floor(Math.random()*46656).toString(36); }
function today(){
  var t=new Date();
  return ('0'+t.getDate()).slice(-2)+'.'+('0'+(t.getMonth()+1)).slice(-2)+'.'+t.getFullYear();
}
function resName(r){ return (r&&r.patientName)?r.patientName:'Ohne Namen'; }
function activate(id){
  D=null;
  for(var i=0;i<APP.residents.length;i++) if(APP.residents[i].rid===id){ D=APP.residents[i]; break; }
  if(!D) D=APP.residents[0];
  if(D) APP.activeId=D.rid;
}
function addResident(){
  var r=blankData(); r.rid=newId(); r.interviewDate=today();
  APP.residents.push(r); activate(r.rid); save();
  return r;
}
function removeResident(id){
  APP.residents=APP.residents.filter(function(r){ return r.rid!==id; });
  if(!APP.residents.length) addResident();
  else if(APP.activeId===id) activate(APP.residents[0].rid);
  else activate(APP.activeId);
  save();
}

/* Zustand */
var S = { screen:'home', sel:0, editKey:null, cell:0, busy:false, hintTimer:null,
          bewId:null, delArm:false, kbVis:false, shift:false, layer:'abc' };

/* ==========================================================
   Persistenz — creationStorage (r1) mit localStorage-Fallback
   ========================================================== */
function b64enc(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64dec(s){ return decodeURIComponent(escape(atob(s))); }
var onR1Store = function(){ return window.creationStorage && creationStorage.plain; };
function stGet(key){
  if(onR1Store()){
    return creationStorage.plain.getItem(key).then(function(v){
      return v ? JSON.parse(b64dec(v)) : null;
    }).catch(function(){ return null; });
  }
  try{ var v=localStorage.getItem(key); return Promise.resolve(v?JSON.parse(v):null); }
  catch(e){ return Promise.resolve(null); }
}
var saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    var json=JSON.stringify(APP);
    try{
      if(onR1Store()){ creationStorage.plain.setItem('sis_r1_v2', b64enc(json)); }
      else localStorage.setItem('sis_r1_v2', json);
    }catch(e){}
  },300);
}
/* "STT started"-Artefakte aus früheren Diktaten entfernen */
function stripSttNoise(s){
  return String(s||'')
    .replace(/[ \t]*\bSTT[ \t]+(?:started|stopped|ended)\b\.?[ \t]*/gi,' ')
    .replace(/[ \t]{2,}/g,' ')
    .replace(/[ \t]+\n/g,'\n')
    .replace(/\n[ \t]+/g,'\n')
    .replace(/^\s+|\s+$/g,'');
}
var TEXT_KEYS=['patientName','birthDate','interviewDate','nurseSign','oTon','tf1','tf2','tf3','tf4','tf5','tf6'];
/* Datensatz gegen das Soll-Schema normalisieren */
function normRecord(o){
  var b=blankData();
  if(o) for(var k in b) if(o[k]!==undefined) b[k]=o[k];
  b.rid=(o&&o.rid)||newId();
  TEXT_KEYS.forEach(function(k){ b[k]=stripSttNoise(b[k]); });
  return b;
}
function load(cb){
  stGet('sis_r1_v2').then(function(v2){
    if(v2 && v2.residents && v2.residents.length){
      APP.residents=v2.residents.map(normRecord);
      activate(v2.activeId);
      return cb();
    }
    /* Migration: alte Einzeldokumentation wird erster Verzeichnis-Eintrag */
    stGet('sis_r1').then(function(v1){
      if(v1){ APP.residents=[normRecord(v1)]; activate(APP.residents[0].rid); save(); }
      else addResident();
      cb();
    });
  });
}

/* ==========================================================
   Menüs
   ========================================================== */
function homeItems(){
  return [
    {id:'bew', idx:'B', lab:resName(D), st:String(APP.residents.length)},
    {id:'meta', idx:'S', lab:'Stammdaten', st:metaCount()},
    {id:'oTon', idx:'O', lab:'O-Ton · Augenblick', st:D.oTon?'●':'○'},
    {id:'tf1', idx:'1', lab:TF_KURZ[0], st:D.tf1?'●':'○'},
    {id:'tf2', idx:'2', lab:TF_KURZ[1], st:D.tf2?'●':'○'},
    {id:'tf3', idx:'3', lab:TF_KURZ[2], st:D.tf3?'●':'○'},
    {id:'tf4', idx:'4', lab:TF_KURZ[3], st:D.tf4?'●':'○'},
    {id:'tf5', idx:'5', lab:TF_KURZ[4], st:D.tf5?'●':'○'},
    {id:'tf6', idx:'6', lab:TF_KURZ[5], st:D.tf6?'●':'○'},
    {id:'risiko', idx:'R', lab:'Risikomatrix', st:riskCount()>0?String(riskCount()):'○'},
    {id:'plan', idx:'▸', lab:'Maßnahmenplan', st:D.plan?'●':''}
  ];
}
function metaItems(){
  return [
    {id:'back', lab:'‹ Zurück', back:true},
    {id:'patientName', idx:'N', lab:D.patientName||'Name', st:D.patientName?'●':'○'},
    {id:'birthDate', idx:'G', lab:D.birthDate||'Geburtsdatum', st:D.birthDate?'●':'○'},
    {id:'interviewDate', idx:'D', lab:D.interviewDate||'Gespräch am', st:D.interviewDate?'●':'○'},
    {id:'nurseSign', idx:'H', lab:D.nurseSign||'Handzeichen', st:D.nurseSign?'●':'○'}
  ];
}
function bewItems(){
  var items=[
    {id:'back', lab:'‹ Zurück', back:true},
    {id:'new', idx:'+', lab:'Neu anlegen'}
  ];
  APP.residents.forEach(function(r){
    items.push({id:'r:'+r.rid, lab:resName(r), st:r.rid===APP.activeId?'●':'○'});
  });
  return items;
}
function bewOptItems(){
  return [
    {id:'back', lab:'‹ Zurück', back:true},
    {id:'open', idx:'▸', lab:'Öffnen'},
    {id:'del', idx:'×', lab:S.delArm?'Wirklich löschen?':'Löschen'}
  ];
}
function bewById(id){
  for(var i=0;i<APP.residents.length;i++) if(APP.residents[i].rid===id) return APP.residents[i];
  return null;
}
function metaCount(){
  var n=0; ['patientName','birthDate','interviewDate','nurseSign'].forEach(function(k){ if(D[k]) n++; });
  return n+'/4';
}
function riskCount(){
  var n=0; D.risiken.forEach(function(row){ row.forEach(function(c){ if(c.v) n++; }); });
  return n;
}

/* ==========================================================
   Rendering
   ========================================================== */
var main=document.getElementById('main');
var hintEl=document.getElementById('hint');
var scrlab=document.getElementById('scrlab');
var kb=document.getElementById('kb');

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function hint(html){ hintEl.className=''; hintEl.innerHTML=html; }
function flash(msg){
  hintEl.className='err'; hintEl.innerHTML=msg;
  clearTimeout(S.hintTimer);
  S.hintTimer=setTimeout(function(){ render(); },1600);
}

function render(){
  clearTimeout(S.hintTimer);
  document.getElementById('bk').style.visibility=(S.screen==='home')?'hidden':'visible';
  if(S.screen!=='edit'){ kb.blur(); }

/* ==========================================================
   Diktat — PTT halten
   1) Web Speech API des Webviews (falls vorhanden)
   2) Fallback: MediaRecorder → /api/transcribe (Whisper)
   ========================================================== */
var TRANSCRIBE_URL='https://sis-assist.vercel.app/api/transcribe';
var recog=null, recorder=null, recChunks=[], dictMode='', pttHeld=false;
function dictState(mode){
  dictMode=mode||'';
  var l=document.getElementById('edlab');
  if(!l||S.screen!=='edit') return;
  if(dictMode==='rec') l.innerHTML='<span class="rec"></span>AUFNAHME …';
  else if(dictMode==='proc') l.innerHTML='VERARBEITE …';
  else l.textContent=FIELDS[S.editKey].label;
}
function hasRecorder(){
  return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && typeof MediaRecorder!=='undefined');
}
var sttTimer=null, sttActive=false;
function startDictation(){
  if(S.screen!=='edit'||dictMode) return;
  pttHeld=true;
  /* Weg 0 (r1-nativ): rabbitOS-STT über CreationVoiceHandler,
     Transkript kommt als {type:'sttEnded', transcript} via onPluginMessage */
  if(typeof CreationVoiceHandler!=='undefined'){
    try{
      CreationVoiceHandler.postMessage('start');
      sttActive=true; dictState('rec');
      return;
    }catch(e){ sttActive=false; }
  }
  if(hasRecorder()) startRecorder();
  else startSR();
}
/* Weg 1 (Standard): aufnehmen solange PTT gehalten, dann Whisper */
function startRecorder(){
  dictState('rec'); /* sofortiges Feedback, noch vor der Mikrofon-Freigabe */
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    /* PTT wurde schon wieder losgelassen, bevor das Mikrofon bereit war */
    if(!pttHeld){ stream.getTracks().forEach(function(t){ t.stop(); }); dictState(''); return; }
    recChunks=[];
    try{ recorder=new MediaRecorder(stream); }
    catch(e){ stream.getTracks().forEach(function(t){t.stop();}); dictState(''); flash('MIKROFON NICHT VERFÜGBAR — ABC-TASTATUR NUTZEN'); return; }
    recorder.ondataavailable=function(e){ if(e.data&&e.data.size) recChunks.push(e.data); };
    recorder.onstop=function(){
      stream.getTracks().forEach(function(t){ t.stop(); });
      var blob=new Blob(recChunks,{type:(recorder&&recorder.mimeType)||'audio/webm'});
      recorder=null;
      if(blob.size<1000){ dictState(''); return; } /* zu kurz — nichts gesagt */
      dictState('proc');
      var fr=new FileReader();
      fr.onload=function(){
        var b64=String(fr.result).split(',')[1];
        fetch(TRANSCRIBE_URL,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({audio:b64,mime:blob.type})
        }).then(function(r){ return r.json().then(function(j){ return {ok:r.ok,j:j}; }); })
          .then(function(x){
            dictState('');
            if(!x.ok) throw new Error((x.j.error&&x.j.error.message)||'Transkription fehlgeschlagen');
            if(x.j.text) dictate(String(x.j.text).trim());
          })
          .catch(function(err){ dictState(''); flash('DIKTAT: '+esc(err.message||'Fehler').toUpperCase().slice(0,50)); });
      };
      fr.readAsDataURL(blob);
    };
    recorder.start();
  }).catch(function(){ dictState(''); flash('KEIN MIKROFON-ZUGRIFF — ABC-TASTATUR NUTZEN'); });
}
/* Weg 2 (Notnagel ohne MediaRecorder): Web Speech API des Webviews */
function startSR(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ flash('DIKTAT HIER NICHT VERFÜGBAR — ABC-TASTATUR NUTZEN'); return; }
  try{
    recog=new SR();
    recog.lang='de-DE'; recog.continuous=true; recog.interimResults=false;
    recog.onresult=function(ev){
      var t='';
      for(var i=ev.resultIndex;i<ev.results.length;i++)
        if(ev.results[i].isFinal) t+=ev.results[i][0].transcript;
      if(t) dictate(t.trim());
    };
    recog.onend=function(){ recog=null; if(dictMode==='rec') dictState(''); };
    recog.onerror=function(){ recog=null; dictState(''); };
    recog.start(); dictState('rec');
  }catch(e){ recog=null; dictState(''); flash('DIKTAT HIER NICHT VERFÜGBAR — ABC-TASTATUR NUTZEN'); }
}
function stopDictation(){
  pttHeld=false;
  if(sttActive){
    sttActive=false;
    try{ CreationVoiceHandler.postMessage('stop'); }catch(e){}
    dictState('proc');
    /* Sicherheitsnetz: falls kein sttEnded eintrifft */
    clearTimeout(sttTimer);
    sttTimer=setTimeout(function(){ if(dictMode==='proc') dictState(''); },10000);
    return;
  }
  if(recog){ try{ recog.stop(); }catch(e){} recog=null; dictState(''); return; }
  if(recorder && recorder.state==='recording'){ try{ recorder.stop(); }catch(e){ recorder=null; dictState(''); } return; }
  if(dictMode==='rec') dictState('');
}

/* Markdown-lite → HTML */
function md(src){
  var out=[], lines=String(src).split(/\r?\n/), para=[];
  function inline(s){
    return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
  }
  function flushP(){ if(para.length){ out.push('<p>'+inline(para.join(' '))+'</p>'); para=[]; } }
  lines.forEach(function(l){
    var t=l.trim();
    if(!t){ flushP(); return; }
    var h=t.match(/^#{1,4}\s+(.*)$/);
    if(h){ flushP(); out.push('<h4>'+inline(h[1].replace(/\*\*/g,''))+'</h4>'); return; }
    var li=t.match(/^(?:[-*•]|\d+\.)\s+(.*)$/);
    if(li){ flushP(); out.push('<li>'+inline(li[1])+'</li>'); return; }
    para.push(t);
  });
  flushP();
  return out.join('');
}

function buildMessage(){
  var m='# Strukturierte Informationssammlung (SIS)\n\n## Stammdaten\n';
  m+='- **Name:** '+(D.patientName||'Nicht angegeben')+'\n';
  m+='- **Geburtsdatum:** '+(D.birthDate||'Nicht angegeben')+'\n';
  m+='- **Gespräch am:** '+(D.interviewDate||'Nicht angegeben')+'\n';
  m+='- **Handzeichen:** '+(D.nurseSign||'Nicht angegeben')+'\n\n';
  m+='## O-Ton der pflegebedürftigen Person\n"'+(D.oTon||'Keine Angaben')+'"\n\n## Themenfelder\n\n';
  for(var i=1;i<=6;i++){
    m+='### '+i+'. '+THEMENFELDER[i-1]+'\n'+(D['tf'+i]||'Keine Angaben')+'\n\n';
  }
  m+='## Risikomatrix\n\n| Themenfeld | '+RISIKEN.join(' | ')+' |\n';
  m+='|'+' --- |'.repeat(RISIKEN.length+1)+'\n';
  THEMENFELDER.forEach(function(tf,ti){
    var row='| '+(ti+1)+'. '+tf+' |';
    RISIKEN.forEach(function(_,ri){
      var c=D.risiken[ti][ri];
      row+=' '+((c.v||'-')+(c.w?' (!)':''))+' |';
    });
    m+=row+'\n';
  });
  m+='\n*Hinweis: (!) = weitere Einschätzung notwendig*\n\n---\n\n';
  m+='Bitte erstelle auf Basis dieser Informationen einen individuellen Maßnahmenplan.';
  return m;
}

function onR1(){ return typeof PluginMessageHandler!=='undefined'; }
var busyEl=document.getElementById('busy');

function generatePlan(){
  if(S.busy) return;
  var hasTf=false; for(var i=1;i<=6;i++) if(D['tf'+i]) hasTf=true;
  if(!D.oTon && !hasTf){ flash('MIND. O-TON ODER EIN THEMENFELD AUSFÜLLEN'); return; }
  S.busy=true; busyEl.classList.add('vis');
  var msg=buildMessage();
  fetch(API_URL,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system:SYSTEM_PROMPT,message:msg})
  }).then(function(r){ return r.json().then(function(j){ return {ok:r.ok,j:j}; }); })
    .then(function(x){
      if(!x.ok) throw new Error((x.j.error&&x.j.error.message)||'API-Fehler');
      planDone(x.j.text||'');
    })
    .catch(function(err){
      if(onR1()){
        /* Fallback: rabbit-LLM des Geräts */
        try{
          PluginMessageHandler.postMessage(JSON.stringify({
            message:SYSTEM_PROMPT+'\n\n'+msg, useLLM:true, wantsR1Response:false
          }));
          return; /* Antwort kommt über onPluginMessage */
        }catch(e){}
      }
      planFail(err&&err.message||'Keine Verbindung');
    });
}
function planDone(text){
  S.busy=false; busyEl.classList.remove('vis');
  if(!text){ planFail('Leere Antwort'); return; }
  D.plan=text; save();
  S.screen='result'; render();
}
function planFail(msg){
  S.busy=false; busyEl.classList.remove('vis');
  render(); flash('FEHLER: '+esc(msg).toUpperCase().slice(0,60));
}

/* rabbitOS-Nachrichten: STT-Transkript (sttEnded) oder LLM-Antwort.
   Wichtig: rabbitOS sendet auch Status-Meldungen wie "STT started" —
   ins Feld darf ausschließlich das Transkript aus sttEnded. */
function isSttNoise(t){ return /^\s*stt\s+(started|stopped|ended|error)\s*\.?\s*$/i.test(t); }
window.onPluginMessage=function(e){
  var d=e;
  if(typeof e==='string'){ try{ d=JSON.parse(e); }catch(_){ d=e; } }
  /* Diktat: natives Speech-to-Text des Geräts */
  if(d && d.type==='sttEnded'){
    clearTimeout(sttTimer);
    var t=String(d.transcript||'').trim();
    dictState('');
    if(t && !isSttNoise(t) && S.screen==='edit') dictate(t);
    return;
  }
  /* andere getypte Ereignisse (sttStarted, …) sind Status — ignorieren */
  if(d && typeof d==='object' && d.type) return;
  var text='';
  if(typeof d==='string') text=d;
  else if(d){ text=d.message||d.data||d.text||''; if(typeof text!=='string') text=JSON.stringify(text); }
  if(!text || isSttNoise(text)) return;
  /* Nur noch die LLM-Antwort für den Maßnahmenplan wird angenommen —
     Freitext-Nachrichten sind KEIN Diktat (das kommt allein via sttEnded) */
  if(S.busy){ planDone(text); return; }
};

    var it=homeItems()[S.sel];
    if(it.id==='bew'){ S.homeSel=S.sel; S.screen='bew'; S.sel=1; render(); }
    else if(it.id==='meta'){ S.homeSel=S.sel; S.screen='meta'; S.sel=1; render(); }
    else if(it.id==='risiko'){ S.homeSel=S.sel; S.screen='risiko'; S.cell=0; render(); }
    else if(it.id==='plan'){ S.homeSel=S.sel; S.screen='plan'; S.sel=1; render(); }
    else { S.homeSel=S.sel; openEdit(it.id); }
  }
  else if(S.screen==='meta'){
    var m=metaItems()[S.sel];
    if(m.id==='back'){ back(); } else openEdit(m.id);
  }
  else if(S.screen==='bew'){
    var b=bewItems()[S.sel];
    if(b.id==='back'){ back(); }
    else if(b.id==='new'){
      addResident();
      /* direkt den Namen erfassen */
      S.prev='home'; S.prevSel=0; S.editKey='patientName'; S.screen='edit'; render();
    }
    else{
      S.bewId=b.id.slice(2); S.delArm=false; S.screen='bewopt'; S.sel=1; render();
    }
  }
  else if(S.screen==='bewopt'){
    var o=bewOptItems()[S.sel];
    if(o.id==='back'){ back(); }
    else if(o.id==='open'){
      activate(S.bewId); save();
      S.screen='home'; S.sel=0; render();
    }
    else if(o.id==='del'){
      if(!S.delArm){ S.delArm=true; render(); }
      else{
        removeResident(S.bewId);
        S.delArm=false; S.screen='bew'; S.sel=1; render();
      }
    }
  }
  else if(S.screen==='edit'){ closeEdit(); }
  else if(S.screen==='risiko'){
    if(S.cell===36){ back(); } else cycleCell(S.cell);
  }
  else if(S.screen==='plan'){
    var pl=planItems()[S.sel];
    if(pl.id==='back'){ back(); }
    else if(pl.id==='gen'){ generatePlan(); }
    else { S.screen='result'; render(); }
  }
  else if(S.screen==='result'){ S.screen='plan'; S.sel=1; render(); }
}
function back(){
  if(S.busy) return;
  S.delArm=false;
  if(S.screen==='edit'){ closeEdit(); return; }
  if(S.screen==='result'){ S.screen='plan'; S.sel=1; render(); return; }
  if(S.screen==='bewopt'){ S.screen='bew'; S.sel=1; render(); return; }
  if(S.screen!=='home'){ S.screen='home'; S.sel=S.homeSel||0; render(); return; }
}

/* r1-Hardware */
window.addEventListener('scrollUp',function(){ wheel(-1); });
window.addEventListener('scrollDown',function(){ wheel(1); });
window.addEventListener('sideClick',function(){ confirmAction(); });
window.addEventListener('longPressStart',function(){
  if(S.screen==='edit') startDictation();
});
window.addEventListener('longPressEnd',function(){
  if(S.screen==='edit') stopDictation();
});

/* Desktop-Vorschau */
window.addEventListener('keydown',function(e){
  if(e.key==='ArrowUp'){ e.preventDefault(); wheel(-1); }
  else if(e.key==='ArrowDown'){ e.preventDefault(); wheel(1); }
  else if(e.key==='Escape'){ e.preventDefault(); back(); }
  else if(e.key==='Enter'){
    if(S.screen==='edit' && FIELDS[S.editKey].multi) return; /* Enter = Zeilenumbruch */
    e.preventDefault(); confirmAction();
  }
});
var wheelAcc=0;
window.addEventListener('wheel',function(e){
  wheelAcc+=e.deltaY;
  if(Math.abs(wheelAcc)>40){ wheel(wheelAcc>0?1:-1); wheelAcc=0; }
},{passive:true});
document.getElementById('brand').addEventListener('click',back);
document.getElementById('bk').addEventListener('click',back);

/* Start */
load(function(){
  if(!D.interviewDate) D.interviewDate=today();
  render();
});
</script>
