<!-- @dsCard group="Components" name="Badges & Toasts" subtitle="Status-Badges · Toast-Benachrichtigungen" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback – SIS Assist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --color-bg:#f7f8fc;--color-card:#fff;--color-primary:#6366f1;--color-text:#1e1b39;--color-text-muted:#6b7280;
    --color-accent:#ec4899;--color-success:#10b981;--color-danger:#ef4444;--radius-md:16px;
    --font-body:'Inter',sans-serif;--font-display:'Plus Jakarta Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);padding:2.5rem;line-height:1.6}
  h2{font-family:var(--font-display);font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);margin:1.75rem 0 .9rem}
  h2:first-child{margin-top:0}
  .row{display:flex;flex-wrap:wrap;gap:1rem;align-items:center}
  .status-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.75rem;padding:.3rem .6rem;border-radius:20px;font-weight:500}
  .status-badge.success{background:rgba(16,185,129,.12);color:var(--color-success)}
  .status-badge.warning{background:rgba(236,72,153,.12);color:var(--color-accent)}
  .status-badge.error{background:rgba(239,68,68,.12);color:var(--color-danger)}
  .toast{background:var(--color-card);border-radius:var(--radius-md);padding:1rem 1.5rem;box-shadow:0 12px 45px rgba(99,102,241,.18);display:flex;align-items:center;gap:.75rem;max-width:350px}
  .toast.success{border-left:4px solid var(--color-success)}
  .toast.error{border-left:4px solid var(--color-danger)}
  .toast.info{border-left:4px solid var(--color-primary)}
  .toast svg{width:24px;height:24px;flex-shrink:0}
  .toast.success svg{color:var(--color-success)}.toast.error svg{color:var(--color-danger)}.toast.info svg{color:var(--color-primary)}
  .toast-msg{font-size:.9rem}
</style>
</head>
<body>
  <h2>Status-Badges</h2>
  <div class="row">
    <span class="status-badge success">✓ Konfiguriert</span>
    <span class="status-badge warning">⚠ Ungültiges Format</span>
    <span class="status-badge error">✗ Nicht konfiguriert</span>
  </div>

  <h2>Toasts</h2>
  <div class="row" style="flex-direction:column;align-items:flex-start">
    <div class="toast success"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span class="toast-msg">Maßnahmenplan erfolgreich erstellt</span></div>
    <div class="toast info"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><span class="toast-msg">Formular wurde geleert</span></div>
    <div class="toast error"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span class="toast-msg">Falsches Passwort</span></div>
  </div>
</body>
</html>
