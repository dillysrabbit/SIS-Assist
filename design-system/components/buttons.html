<!-- @dsCard group="Components" name="Buttons" subtitle="Primary / Secondary / Accent / Icon · Hover & Disabled" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buttons – SIS Assist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --color-bg:#f7f8fc;--color-card:#fff;--color-primary:#6366f1;--color-text:#1e1b39;
    --color-text-muted:#6b7280;--color-border:#e5e7f0;--color-accent:#ec4899;--color-accent-light:#f472b6;
    --color-primary-pale:#eef2ff;--radius-sm:10px;--radius-md:16px;--font-body:'Inter',sans-serif;
    --font-display:'Plus Jakarta Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);padding:2.5rem}
  h2{font-family:var(--font-display);font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);margin:1.75rem 0 .9rem}
  h2:first-child{margin-top:0}
  .row{display:flex;flex-wrap:wrap;gap:1rem;align-items:center}
  .btn{font-family:var(--font-body);font-size:1rem;font-weight:500;padding:1rem 2rem;border-radius:var(--radius-md);cursor:pointer;display:inline-flex;align-items:center;gap:.75rem;border:none;transition:.25s ease}
  .btn svg{width:20px;height:20px}
  .btn-primary{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);color:#fff;box-shadow:0 4px 15px rgba(99,102,241,.35)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.45)}
  .btn-secondary{background:var(--color-card);color:var(--color-text);border:1px solid var(--color-border)}
  .btn-secondary:hover{border-color:var(--color-primary);color:var(--color-primary);background:var(--color-primary-pale)}
  .btn-accent{background:linear-gradient(135deg,var(--color-accent) 0%,var(--color-accent-light) 100%);color:#fff;box-shadow:0 4px 15px rgba(236,72,153,.32)}
  .btn-accent:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(236,72,153,.42)}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .btn-icon{padding:.6rem;border-radius:var(--radius-sm);background:var(--color-bg);border:1px solid var(--color-border);color:var(--color-text-muted);cursor:pointer;transition:.15s ease}
  .btn-icon:hover{background:var(--color-primary-pale);border-color:var(--color-primary);color:var(--color-primary)}
  .btn-icon svg{width:20px;height:20px;display:block}
</style>
</head>
<body>
  <h2>Primary &amp; Secondary</h2>
  <div class="row">
    <button class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Maßnahmenplan generieren</button>
    <button class="btn btn-secondary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>Formular leeren</button>
  </div>

  <h2>Accent</h2>
  <div class="row"><button class="btn btn-accent">Akzent-Aktion</button></div>

  <h2>Disabled</h2>
  <div class="row"><button class="btn btn-primary" disabled>Maßnahmenplan generieren</button></div>

  <h2>Icon-Buttons</h2>
  <div class="row">
    <button class="btn-icon" title="Kopieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
    <button class="btn-icon" title="Teilen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
  </div>
</body>
</html>
